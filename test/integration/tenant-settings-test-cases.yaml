  010 - tenant-settings country-codes update with valid list and allow mode:
    command: auth0 tenant-settings country-codes update --list US,GB,CA --mode allow --json
    exit-code: 0
    stdout:
      json:
        mode: allow
        list.0: US
        list.1: GB
        list.2: CA

  011 - tenant-settings country-codes update with valid list and deny mode:
    command: auth0 tenant-settings country-codes update --list DE,FR --mode deny --json
    exit-code: 0
    stdout:
      json:
        mode: deny
        list.0: DE
        list.1: FR

  012 - tenant-settings country-codes show displays configured filtering:
    command: auth0 tenant-settings country-codes show
    exit-code: 0
    stdout:
      contains:
        - MODE
        - LIST

  013 - tenant-settings country-codes show as json:
    command: auth0 tenant-settings country-codes show --json
    exit-code: 0
    stdout:
      json:
        mode: deny
        list.0: DE
        list.1: FR

  014 - tenant-settings country-codes remove clears filtering:
    command: auth0 tenant-settings country-codes remove
    exit-code: 0
    stdout:
      contains:
        - removed

  015 - tenant-settings country-codes show after remove reports none:
    command: auth0 tenant-settings country-codes show
    exit-code: 0
    stdout:
      contains:
        - No country codes filtering is configured
